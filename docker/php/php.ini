; ─── Error handling ──────────────────────────────────────────────────────────
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /var/log/php/error.log
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ─── Resource limits ──────────────────────────────────────────────────────────
memory_limit           = 256M
max_execution_time     = 120
max_input_time         = 120
post_max_size          = 64M
upload_max_filesize    = 64M

; ─── Misc ─────────────────────────────────────────────────────────────────────
date.timezone          = UTC
expose_php             = Off
short_open_tag         = Off
